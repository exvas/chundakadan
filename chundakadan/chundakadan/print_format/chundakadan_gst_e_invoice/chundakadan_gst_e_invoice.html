<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Template</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 11px; line-height: 1.3; background-color: #f5f5f5; padding: 10px;
            font-feature-settings: 'cv11', 'ss01'; font-variation-settings: 'slnt' 0;
            -webkit-print-color-adjust: exact !important; color-adjust: exact !important; print-color-adjust: exact !important;
        }

        .invoice-container { max-width: 210mm; margin: 0 auto; background: white; border: 1px solid #333 !important; color: #000; position: relative; }

        .company-header { text-align: center; padding: 8px; width: 100%; border-bottom: 1px solid #333 !important; }
        .company-gstin { font-weight: 700; font-size: 14px; margin-bottom: 3px; letter-spacing: 1px; }
        .company-name { font-weight: 700; font-size: 16px; text-transform: uppercase; }

        /* wkhtmltopdf (Qt WebKit ~2014) does NOT support flexbox reliably.
           Use a CSS table so the e-invoice/transaction block and the QR
           render side-by-side in PDF output. */
        .top-section-wrapper { display: table; width: 100%; position: relative; border-collapse: collapse; }
        .left-content { display: table-cell; vertical-align: top; border-right: 1px solid #333 !important; }

        .qr-section { display: table-cell; width: 170px; vertical-align: top; padding: 6px 8px; text-align: center; }
        .qr-section-header { font-weight: 700; font-size: 10px; text-align: center; margin-bottom: 5px; color: #000; letter-spacing: 0.3px; text-transform: uppercase; }
        .qr-code-container { width: 130px; height: 130px; border: 1px solid #333 !important; background-color: #fff; margin: 0 auto; text-align: center; line-height: 130px; }
        .qr-code-container img { width: 126px; height: 126px; object-fit: contain; }

        .qr-details { width: 100%; padding: 5px; font-size: 9px; text-align: center; }
        .qr-details p { margin: 2px 0; word-wrap: break-word; word-break: break-all; white-space: normal; }
        .field-property { margin: 1px 0; }

        .einvoice-section { width: 100%; border-bottom: 1px solid #333 !important; }
        .transaction-section { width: 100%; }

        .section-title { font-weight: 600; font-size: 11px; margin: 0; padding: 4px 8px; width: 100%; }

        .einvoice-table { width: 100%; border-collapse: collapse; font-size: 10px; border-top: 1px solid #333 !important; }
        .einvoice-table td { border-top: 1px solid #333 !important; border-right: 1px solid #333 !important; padding: 3px 6px; vertical-align: top; font-size: 11px; }
        .einvoice-table td:first-child { width: 80px; font-weight: 600; }

        .transaction-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .transaction-table td { border: 1px solid #333 !important; padding: 3px 6px; vertical-align: top; font-size: 11px; }
        .transaction-table td:nth-child(1), .transaction-table td:nth-child(3) { width: 21%; font-weight: 600; }
        .transaction-table td:nth-child(2), .transaction-table td:nth-child(4) { width: 30%; }

        .full-width-content { width: 100%; }

        .party-table { width: 100%; border-collapse: collapse; font-size: 10px; border-top: 1px solid #333 !important; }
        .party-table td { border: 1px solid #333 !important; padding: 6px; vertical-align: top; width: 50%; }

        .items-table { width: 100%; border-collapse: collapse; font-size: 9px; }
        .items-table th, .items-table td { border: 1px solid #333 !important; padding: 2px 3px; text-align: center; vertical-align: middle; }
        .items-table th { font-weight: 600; background-color: #f8f9fa !important; }
        .items-table .desc-col { text-align: left; font-size: 8px; }
        .items-table .num-col { text-align: right; }

        .main-header { background-color: #e9ecef !important; font-weight: 700; }
        .sub-header { background-color: #f1f3f4 !important; font-size: 8px; }
        .total-row { font-weight: 600; }

        .eway-table { width: 100%; border-collapse: collapse; font-size: 10px; }
        .eway-table td { border: 1px solid #333 !important; padding: 3px 6px; vertical-align: top; }

        .bottom-table { width: 100%; border-collapse: collapse; font-size: 10px; border-top: 1px solid #333 !important; }
        .bottom-table td { border-left: 1px solid #333 !important; padding: 8px; vertical-align: top; }
        .bottom-table td:first-child { border-left: none !important; }

        .qr-side-cell { text-align: center; vertical-align: middle !important; width: 22%; }
        .qr-side-cell img { width: 110px; height: 110px; object-fit: contain; border: 1px solid #333 !important; padding: 2px; background: #fff; }
        .qr-side-cell .qr-caption { font-weight: 700; font-size: 10px; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
        .qr-side-cell .qr-subcaption { font-size: 9px; color: #333; margin-top: 2px; }

        .letter-head-container, .letter-head-footer, .letter-footer-container { margin: 0; padding: 0; height: auto; }

        /* wkhtmltopdf only respects page-break-inside on block-level
           wrappers, not on <table> directly. Keep the eway+bank+QR
           block together; if it doesn't fit, the whole group pushes to
           the next page rather than the bank-QR row splitting off. */
        .no-break { page-break-inside: avoid; -webkit-region-break-inside: avoid; break-inside: avoid; }
        .no-break tr { page-break-inside: avoid; }

        .bold { font-weight: 600; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        @media print {
            body { background: white !important; padding: 0 !important; margin: 0 !important;
                -webkit-print-color-adjust: exact !important; color-adjust: exact !important; print-color-adjust: exact !important; }
            .invoice-container { border: 1px solid #333 !important; box-shadow: none !important; margin: 0 !important; max-width: none !important; width: 100% !important; }
            table, th, td { border-color: #333 !important; border-style: solid !important; border-width: 0px !important; }
            .company-header { border-bottom: 1px solid #333 !important; }
            .left-content { border-right: 1px solid #333 !important; }
            .einvoice-section { border-bottom: 1px solid #333 !important; }
            .qr-code-container { border: 1px solid #333 !important; }
            .qr-side-cell img { border: 1px solid #333 !important; }
            .items-table th { background-color: #f8f9fa !important; -webkit-print-color-adjust: exact !important; }
            .main-header { background-color: #e9ecef !important; -webkit-print-color-adjust: exact !important; }
            .sub-header { background-color: #f1f3f4 !important; -webkit-print-color-adjust: exact !important; }
        }

        @page { margin: 0.5in; size: A4; }
    </style>
</head>
<body>
    {#-
      Frappe extracts id="header-html"/id="footer-html" and hands them to
      wkhtmltopdf as standalone --header-html / --footer-html documents.
      Those docs do NOT inherit the main <style> block, so every rule
      that needs to apply must be inline. Repeats on every page.
    -#}
    <div id="header-html" class="letter-head-container">
        {% if letter_head %}
            <div class="letter-head">{{ letter_head }}</div>
        {% else %}
            {% set _company_gstin = frappe.db.get_value("Address", doc.company_address, "gstin") if doc.company_address else "" %}
            <table style="width:100%; border-collapse:collapse; font-family:'Inter',Arial,sans-serif; font-size:10px; color:#000; border-bottom:1px solid #333; padding:0; margin:0;">
                <tr>
                    <td style="padding:6px 10px; vertical-align:middle; text-align:left;">
                        <div style="font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:0.4px;">{{ doc.company or "CHUNDAKADAN AGENCIES" }}</div>
                        <div style="font-size:10px; margin-top:1px;">GSTIN: <b>{{ _company_gstin or "32AAGFC3363E1ZX" }}</b></div>
                    </td>
                    <td style="padding:6px 10px; vertical-align:middle; text-align:right; font-size:10px;">
                        <div style="font-weight:700; text-transform:uppercase; letter-spacing:0.3px;">{{ doc.select_print_heading or "Tax Invoice" }}</div>
                        <div><b>{{ doc.name }}</b> &nbsp;|&nbsp; {{ doc.posting_date }}</div>
                    </td>
                </tr>
            </table>
        {% endif %}
    </div>

    <div class="invoice-container">
        <div class="company-header">
            <div class="company-gstin">{{ frappe.db.get_value("Address", doc.company_address, "gstin") or "32AAGFC3363E1ZX" }}</div>
            <div class="company-name">{{ doc.company or "CHUNDAKADAN AGENCIES" }}</div>
        </div>

        <div class="top-section-wrapper">
            <div class="left-content">
                <div class="einvoice-section">
                    <div class="section-title">1.e-Invoice Details</div>
                    <table class="einvoice-table">
                        <tr>
                            <td>IRN</td>
                            <td><b>{{ doc.irn }}</b></td>
                        </tr>
                        <tr>
                            <td>Ack No.</td>
                            <td>
                                {% if doc.irn %}
                                    {% set e_invoice_log = frappe.db.get_value("e-Invoice Log", doc.irn, ("invoice_data", "signed_qr_code"), as_dict=True ) %}
                                    {% if e_invoice_log %}
                                        {% set invoice_data = json.loads(e_invoice_log.invoice_data) %}
                                        {% set date_format = frappe.db.get_single_value("System Settings",'date_format').replace("mm","MM") %}
                                        <b>{{ invoice_data.get("AckNo") if invoice_data.get("AckNo") else '' }}</b> &nbsp;&nbsp;&nbsp;&nbsp;
                                        <span>Ack Date : <b>{{ frappe.utils.format_datetime(invoice_data.get("AckDt"),date_format) if invoice_data.get("AckDt") else doc.posting_date }}</b></span>
                                    {% else %}
                                        <b></b> &nbsp;&nbsp;&nbsp;&nbsp;
                                        <span>Ack Date : <b>{{ doc.posting_date }} {{ doc.posting_time }}</b></span>
                                    {% endif %}
                                {% endif %}
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="transaction-section">
                    <div class="section-title">2.Transaction Details</div>
                    <table class="transaction-table">
                        <tr>
                            <td>Category</td>
                            <td><b>B2B</b></td>
                            <td>Document No</td>
                            <td><b>{{ doc.name }}</b></td>
                        </tr>
                        <tr>
                            <td>Document Type</td>
                            <td><b>{{ doc.select_print_heading if doc.select_print_heading else 'Tax Invoice' }}</b></td>
                            <td>Document Date</td>
                            <td><b>{{ doc.posting_date }}</b></td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="qr-section">
                <div class="qr-section-header">India Compliance<br>GST E-Invoice</div>
                <div class="qr-code-container">
                    {% if doc.irn %}
                        {% set e_invoice_log = frappe.db.get_value("e-Invoice Log", doc.irn, ("invoice_data", "signed_qr_code"), as_dict=True ) %}
                        {% if e_invoice_log and e_invoice_log.signed_qr_code %}
                            {{ web_block('e-Invoice QR', values={'e_invoice_qr_text': e_invoice_log.signed_qr_code }) }}
                        {% endif %}
                    {% endif %}
                </div>

                {% if doc.irn %}
                    {% set e_invoice_log = frappe.db.get_value("e-Invoice Log", doc.irn, ("invoice_data", "signed_qr_code"), as_dict=True ) %}
                    {% if e_invoice_log %}
                        {% set invoice_data = json.loads(e_invoice_log.invoice_data) %}
                        {% set date_format = frappe.db.get_single_value("System Settings",'date_format').replace("mm","MM") %}
                        <div class="qr-details">
                            <p class="field-property"><b>IRN :</b><br><span style="word-wrap: break-word;word-break: break-all;white-space: normal;">{{ doc.irn }}</span></p>
                            <p class="field-property"><b>Ack No.</b><br><span>{{ invoice_data.get("AckNo") if invoice_data.get("AckNo") else '' }}</span></p>
                            <p class="field-property"><b>Ack Dt.</b><br><span>{{ frappe.utils.format_datetime(invoice_data.get("AckDt"),date_format) if invoice_data.get("AckDt") else '' }}</span></p>
                        </div>
                    {% endif %}
                {% endif %}
            </div>
        </div>

        <div class="full-width-content">
            <div class="section-title">Details of Receiver (Billed to)</div>
            <table class="party-table">
                <tr>
                    <td style="font-size: 11px;">
                        <div class="bold">Seller</div><br>
                        {% set company_addr = frappe.get_doc("Address", doc.company_address) if doc.company_address else None %}
                        {% if company_addr %}
                        <div><span class="bold">GSTIN :</span> <strong>{{ company_addr.gstin }}</strong></div>
                        <div class="bold">{{ company_addr.address_title }}</div>
                        <div>{{ company_addr.address_line1 }}{% if company_addr.address_line2 %}, {{ company_addr.address_line2 }}{% endif %}<br>{{ company_addr.city }}</div>
                        <div><span>PIN :</span> {{ company_addr.pincode }}</div>
                        <div><span>E-Mail :</span> {{ company_addr.email_id }}</div>
                        <div><span>State :</span> {{ company_addr.gst_state }}</div>
                        <div><span>State Code :</span> {{ company_addr.gst_state_number }}</div>
                        <div><span>Mobile :</span> {{ company_addr.phone }}</div>
                        <div><span>Phone :</span> {{ company_addr.phone }}</div>
                        {% endif %}
                    </td>
                    <td style="font-size: 11px;">
                        <div class="bold">Purchaser</div><br>
                        {%- set customer_doc = frappe.get_doc("Customer", doc.customer) if doc.customer else None -%}
                        {%- set addr_doc = frappe.get_doc("Address", doc.customer_address) if doc.customer_address else None -%}
                        <div>GST No : <strong>{{ (addr_doc.gstin if addr_doc else doc.tax_id) or "" }}</strong></div>
                        <div>Name : <strong>{{ (customer_doc.customer_name if customer_doc else doc.customer_name) or "" }}</strong></div>
                        <div>Address : {{
                            addr_doc.address_line1 + (", " + addr_doc.address_line2 if addr_doc.address_line2 else "") + "<br>" +
                            addr_doc.city + " (" + addr_doc.state + " )" if addr_doc
                            else ""
                        }}</div>
                        <div>State : {{ addr_doc.state if addr_doc else "" }} &nbsp;&nbsp;&nbsp; State Code : {{ addr_doc.gst_state_number if addr_doc else "" }}</div>
                        <div>Mobile No. : {{ addr_doc.phone if addr_doc else "" }} &nbsp;&nbsp; Phone : {{ addr_doc.phone if addr_doc else "" }}</div>
                    </td>
                </tr>
            </table>

            <div class="section-title">4.Item Details</div>
            <table class="items-table">
                <thead>
                    <tr>
                        <th rowspan="2" style="width: 4%;">Sl<br>No</th>
                        <th rowspan="2" style="width: 35%;">Description of Goods</th>
                        <th rowspan="2" style="width: 7%;">Hsn Code<br>(GST)</th>
                        <th rowspan="2" style="width: 5%;">Qty</th>
                        <th rowspan="2" style="width: 5%;">Unit</th>
                        <th rowspan="2" style="width: 7%;">Unit<br>Price</th>
                        <th rowspan="2" style="width: 7%;">Cash<br>Discount</th>
                        <th rowspan="2" style="width: 8%;">Taxable<br>Value</th>
                        <th colspan="2" class="main-header">CGST</th>
                        <th colspan="2" class="main-header">SGST</th>
                        <th colspan="2" class="main-header">IGST</th>
                        <th rowspan="2" style="width: 10%;">Total</th>
                    </tr>
                    <tr>
                        <th class="sub-header" style="width: 3%;">%</th>
                        <th class="sub-header" style="width: 6%;">Amount</th>
                        <th class="sub-header" style="width: 3%;">%</th>
                        <th class="sub-header" style="width: 6%;">Amount</th>
                        <th class="sub-header" style="width: 3%;">%</th>
                        <th class="sub-header" style="width: 6%;">Amount</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in doc.items %}
                    <tr>
                        <td>{{ row.idx or '' }}</td>
                        <td class="desc-col">{{ row.item_name or '' }}</td>
                        <td>{{ row.gst_hsn_code or '' }}</td>
                        <td>{{ row.qty or '' }}</td>
                        <td>{{ row.uom or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.rate) or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.discount_amount) or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.qty * row.rate) or '' }}</td>
                        <td>{{ row.get_formatted('cgst_rate') or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.cgst_amount) or '' }}</td>
                        <td>{{ row.get_formatted('sgst_rate') or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.sgst_amount) or '' }}</td>
                        <td>{{ row.get_formatted('igst_rate') or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(row.igst_amount) or '' }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format((row.qty * row.rate) + row.cgst_amount + row.sgst_amount) or '' }}</td>
                    </tr>
                    {% endfor %}

                    <tr class="total-row">
                        <td colspan="3"><span style="float: left;">E&OE</span> &nbsp;&nbsp;<span>Total :</span></td>
                        <td>{{ doc.items | sum(attribute='qty') }}</td>
                        <td></td>
                        <td>{{ '{:,.2f}'.format(doc.items | sum(attribute='rate')) }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.items | sum(attribute='discount_amount')) }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.total) or '' }}</td>
                        <td></td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.items | sum(attribute='cgst_amount')) }}</td>
                        <td></td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.items | sum(attribute='sgst_amount')) }}</td>
                        <td></td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.items | sum(attribute='igst_amount')) }}</td>
                        <td class="num-col">{{ '{:,.2f}'.format(doc.grand_total) or '' }}</td>
                    </tr>
                </tbody>
            </table>

            <div class="no-break">
            <div class="section-title">5.E Way Bill Details</div>
            <table class="eway-table">
                <tr>
                    <td style="width: 9%; font-weight: 600;">E Way Bill No</td>
                    <td style="width: 11%;">{{ doc.ewaybill or '' }}</td>
                    <td style="width: 10%; font-weight: 600;">Vehicle Number</td>
                    <td style="width: 12%;">{{ doc.vehicle_no or '' }}</td>
                    <td style="width: 14%; font-weight: 600; text-align: right;">Discount</td>
                    <td style="width: 12%; text-align: right;">{{ '{:,.2f}'.format(doc.discount_amount) or '' }}</td>
                </tr>
                <tr>
                    <td class="bold">Eway Bill Date</td>
                    <td>{{ doc.due_date }}</td>
                    <td class="bold">Valid Till Date</td>
                    <td></td>
                    <td class="bold" style="text-align: right;">Round To</td>
                    <td style="text-align: right;">{{ '{:,.2f}'.format(doc.rounded_total) or '' }}</td>
                </tr>
                <tr>
                    <td colspan="4"></td>
                    <td class="bold" style="text-align: right;">Total</td>
                    <td class="bold" style="text-align: right;">{{ '{:,.2f}'.format(doc.grand_total) or '' }}</td>
                </tr>
            </table>

            <table class="bottom-table">
                <tr>
                    <td class="qr-side-cell">
                        <img src="/files/federal_bank.png" alt="Federal Bank UPI">
                        <div class="qr-caption">Scan to Pay</div>
                        <div class="qr-subcaption">Federal Bank</div>
                    </td>
                    <td style="width: 56%; vertical-align: top;">
                        <div>Invoice Value (In Words)</div>
                        <div class="bold">
                            {% set in_words = frappe.utils.money_in_words(doc.rounded_total or doc.grand_total, doc.currency) %}
                            {{ in_words }}
                        </div>
                        <br>
                        <div style="border-top: 1px solid #333 !important; padding-top: 4px;">
                            {% set bank = frappe.db.get_value("Bank Account", {"is_default": 1}, ["account_name", "bank", "branch_code", "bank_account_no"], as_dict=True) %}
                            Bank Details : Bank Name : {{ bank.bank if bank else "" }}
                        </div>
                        <div><span style="margin-left: 66px;">Branch :</span> {{ bank.branch_code if bank else "" }}</div>
                        <div><span style="margin-left: 66px;">A/C No :</span> {{ bank.bank_account_no if bank else "" }}</div>
                        <div><span style="margin-left: 66px;">IFSC :</span> FDRL0001511</div>
                        <br>
                        <div class="text-center bold" style="margin-top: 8px;">{{ doc.company or "CHUNDAKADAN AGENCIES" }}</div>
                        <div class="text-center" style="margin-top: 28px; padding-top: 4px; border-top: 1px solid #333 !important; display: inline-block; margin-left: 30%;">Authorised Signatory</div>
                    </td>
                    <td class="qr-side-cell">
                        <img src="/files/feedback.png" alt="Customer Feedback QR">
                        <div class="qr-caption">Share Feedback</div>
                        <div class="qr-subcaption">Scan to give feedback</div>
                    </td>
                </tr>
            </table>
            </div>
        </div>
    </div>

    <div id="footer-html" class="letter-footer-container">
        {% if footer %}
            <div class="letter-footer">{{ footer }}</div>
        {% else %}
            {% set _company_addr = frappe.get_doc("Address", doc.company_address) if doc.company_address else None %}
            <div style="font-family:'Inter',Arial,sans-serif; font-size:9px; color:#000; text-align:center; border-top:1px solid #333; padding:6px 10px;">
                <div style="font-weight:700; text-transform:uppercase; letter-spacing:0.3px;">{{ doc.company or "CHUNDAKADAN AGENCIES" }}</div>
                <div>
                    {%- if _company_addr -%}
                        {{ _company_addr.address_line1 }}{% if _company_addr.city %}, {{ _company_addr.city }}{% endif %}{% if _company_addr.pincode %} - {{ _company_addr.pincode }}{% endif %}
                        {%- if _company_addr.phone %} &nbsp;|&nbsp; Ph: {{ _company_addr.phone }}{% endif -%}
                        {%- if _company_addr.email_id %} &nbsp;|&nbsp; {{ _company_addr.email_id }}{% endif -%}
                    {%- endif -%}
                </div>
                <div style="margin-top:2px; font-style:italic; color:#444;">Page <span class="page"></span> of <span class="topage"></span></div>
            </div>
            <script>
                /* wkhtmltopdf injects [page]/[topage] into URL params for the
                   footer document; this fills the spans on each rendered page. */
                function subst() {
                    var vars = {};
                    var x = document.location.search.substring(1).split('&');
                    for (var i in x) { var z = x[i].split('=', 2); vars[z[0]] = decodeURI(z[1] || ''); }
                    var cls = ['page', 'topage'];
                    for (var j in cls) {
                        var els = document.getElementsByClassName(cls[j]);
                        for (var k = 0; k < els.length; ++k) els[k].textContent = vars[cls[j]] || '';
                    }
                }
                window.addEventListener('load', subst);
            </script>
        {% endif %}
    </div>
</body>
</html>
